  <rect x="122" y="226" width="20" height="14" rx="1" fill="#e8c060" opacity="0.85"/>
  <rect x="150" y="226" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>
  <rect x="122" y="252" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>
  <rect x="150" y="252" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>
  <rect x="122" y="278" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>
  <rect x="150" y="278" width="20" height="14" rx="1" fill="#e8c060" opacity="0.85"/>
  <rect x="122" y="304" width="20" height="14" rx="1" fill="#e8c060" opacity="0.85"/>
  <rect x="150" y="304" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>
  <rect x="122" y="330" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>
  <rect x="150" y="330" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>

  <!-- ===== RIGHT WING WINDOWS ===== -->
  <rect x="340" y="200" width="20" height="14" rx="1" fill="#e8c060" opacity="0.85"/>
  <rect x="368" y="200" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>
  <rect x="340" y="226" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>
  <rect x="368" y="226" width="20" height="14" rx="1" fill="#e8c060" opacity="0.85"/>
  <rect x="340" y="252" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>
  <rect x="368" y="252" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>
  <rect x="340" y="278" width="20" height="14" rx="1" fill="#e8c060" opacity="0.85"/>
  <rect x="368" y="278" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>
  <rect x="340" y="304" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>
  <rect x="368" y="304" width="20" height="14" rx="1" fill="#e8c060" opacity="0.85"/>
  <rect x="340" y="330" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>
  <rect x="368" y="330" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>

  <!-- Top decorative crown on main tower -->
  <rect x="210" y="88" width="92" height="14" rx="3" fill="url(#buildingGrad)" opacity="0.9"/>
  <rect x="230" y="76" width="52" height="14" rx="3" fill="url(#goldGrad)" opacity="0.95"/>

  <!-- Stars / sparkle top -->
  <circle cx="256" cy="62" r="4" fill="url(#goldGrad)" opacity="0.9"/>
  <circle cx="240" cy="68" r="2.5" fill="#e8c060" opacity="0.7"/>
  <circle cx="272" cy="68" r="2.5" fill="#e8c060" opacity="0.7"/>

  <!-- "FR" subtle watermark bottom right corner — tiny branding -->
  <text x="452" y="500" font-family="Georgia, serif" font-size="28" font-weight="400"
    fill="#ffffff" opacity="0.18" text-anchor="end">FR</text>
</svg>
