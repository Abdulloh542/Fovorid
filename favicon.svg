<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b3d72"/>
      <stop offset="60%" stop-color="#122d5e"/>
      <stop offset="100%" stop-color="#0c1f45"/>
    </linearGradient>
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d0dff8" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c89b2a"/>
      <stop offset="50%" stop-color="#e8c060"/>
      <stop offset="100%" stop-color="#c89b2a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Subtle background glow -->
  <ellipse cx="256" cy="210" rx="180" ry="150" fill="#1e4080" opacity="0.35"/>

  <!-- ===== BUILDING SILHOUETTE ===== -->

  <!-- Main Tower — center tall building -->
  <rect x="174" y="100" width="164" height="310" rx="2" fill="url(#buildingGrad)" opacity="0.97"/>

  <!-- Left wing building -->
  <rect x="110" y="175" width="74" height="235" rx="2" fill="url(#buildingGrad)" opacity="0.82"/>

  <!-- Right wing building -->
  <rect x="328" y="175" width="74" height="235" rx="2" fill="url(#buildingGrad)" opacity="0.82"/>

  <!-- Ground base line -->
  <rect x="90" y="408" width="332" height="8" rx="4" fill="url(#goldGrad)"/>

  <!-- ===== MAIN TOWER WINDOWS ===== -->
  <!-- Row 1 -->
  <rect x="196" y="130" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <rect x="232" y="130" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <rect x="268" y="130" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <!-- Row 2 -->
  <rect x="196" y="162" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <rect x="232" y="162" width="26" height="18" rx="2" fill="#e8c060" opacity="0.9"/>
  <rect x="268" y="162" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <!-- Row 3 -->
  <rect x="196" y="194" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <rect x="232" y="194" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <rect x="268" y="194" width="26" height="18" rx="2" fill="#e8c060" opacity="0.9"/>
  <!-- Row 4 -->
  <rect x="196" y="226" width="26" height="18" rx="2" fill="#e8c060" opacity="0.9"/>
  <rect x="232" y="226" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <rect x="268" y="226" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <!-- Row 5 -->
  <rect x="196" y="258" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <rect x="232" y="258" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <rect x="268" y="258" width="26" height="18" rx="2" fill="#e8c060" opacity="0.9"/>
  <!-- Row 6 -->
  <rect x="196" y="290" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <rect x="232" y="290" width="26" height="18" rx="2" fill="#e8c060" opacity="0.9"/>
  <rect x="268" y="290" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <!-- Row 7 -->
  <rect x="196" y="322" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <rect x="232" y="322" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>
  <rect x="268" y="322" width="26" height="18" rx="2" fill="#1a3a6e" opacity="0.8"/>

  <!-- Entrance door -->
  <rect x="228" y="352" width="56" height="58" rx="3" fill="#1a3a6e" opacity="0.85"/>
  <line x1="256" y1="352" x2="256" y2="410" stroke="url(#buildingGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- ===== LEFT WING WINDOWS ===== -->
  <rect x="122" y="200" width="20" height="14" rx="1" fill="#1a3a6e" opacity="0.75"/>
