<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="100%" stop-color="#0d2147"/>
    </linearGradient>
  </defs>

  <!-- Navy blue background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- FAVORIT — large elegant serif, slightly smaller than image for favicon fit -->
  <text
    x="256"
    y="248"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="148"
    font-weight="400"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="6"
  >FAVORIT</text>

  <!-- RESIDENCE — small, wide letter-spacing, below FAVORIT -->
  <text
    x="256"
    y="308"
    font-family="Georgia, Arial, sans-serif"
    font-size="44"
    font-weight="400"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="10"
  >RESIDENCE</text>
</svg>
